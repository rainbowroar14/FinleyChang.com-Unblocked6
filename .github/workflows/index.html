<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: crosshair;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #score {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 100;
            pointer-events: none;
        }

        #bigBall {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2d3436, #000000);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            transition: all 0.2s ease;
            z-index: 10;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2d3436, #000000);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            z-index: 5;
            pointer-events: none;
            will-change: transform, left, top;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            pointer-events: none;
            z-index: 4;
        }

        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">0</div>
        <div id="bigBall"></div>
        <div id="instructions">Click anywhere to spawn orbs!</div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const bigBall = document.getElementById('bigBall');
        const scoreElement = document.getElementById('score');
        
        let score = 0;
        let bigBallSize = 50;
        let centerX = window.innerWidth / 2;
        let centerY = window.innerHeight / 2;
        
        // Track all active orbs
        const activeOrbs = [];
        
        // Initialize big ball
        bigBall.style.width = bigBallSize + 'px';
        bigBall.style.height = bigBallSize + 'px';
        
        // Big ball physics (can be pulled by combined orbs)
        let bigBallVx = 0;
        let bigBallVy = 0;
        let bigBallPx = window.innerWidth / 2;
        let bigBallPy = window.innerHeight / 2;
        
        // Very subtle liquid jiggle animation for big ball
        let bigBallJiggleTime = 0;
        let bigBallAbsorbing = false;
        function animateBigBall() {
            bigBallJiggleTime += 0.016;
            // Jiggle is now handled in animateBigBallPhysics
            requestAnimationFrame(animateBigBall);
        }
        animateBigBall();

        // Audio context for sound effects (lazy initialization)
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playSound(frequency, duration, type = 'sine') {
            initAudio();
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function createSpawnParticles(x, y) {
            const particleCount = 12;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = Math.random() * 50 + 30;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                gameContainer.appendChild(particle);
                
                let opacity = 1;
                let px = x;
                let py = y;
                let startTime = Date.now();
                
                function animateParticle() {
                    const elapsed = (Date.now() - startTime) / 1000;
                    px += vx * 0.016;
                    py += vy * 0.016;
                    opacity -= 0.02;
                    
                    particle.style.left = px + 'px';
                    particle.style.top = py + 'px';
                    particle.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animateParticle);
                    } else {
                        particle.remove();
                    }
                }
                
                requestAnimationFrame(animateParticle);
            }
        }

        function spawnOrb(x, y, initialVx = 0, initialVy = 0) {
            // Play spawn sound
            playSound(300, 0.1, 'sine');
            
            // Create spawn particles
            createSpawnParticles(x, y);
            
            const orb = document.createElement('div');
            orb.className = 'orb';
            // Spawn with slight size variation (18-22px range)
            const sizeVariation = (Math.random() - 0.5) * 4; // -2 to +2
            let orbSize = 20 + sizeVariation;
            let orbMass = 1 + (sizeVariation / 10); // Mass proportional to size
            orb.style.width = orbSize + 'px';
            orb.style.height = orbSize + 'px';
            orb.style.left = x - orbSize / 2 + 'px';
            orb.style.top = y - orbSize / 2 + 'px';
            
            gameContainer.appendChild(orb);
            
            // Smooth liquid physics
            const startX = x;
            const startY = y;
            let vx = initialVx;
            let vy = initialVy;
            let px = startX;
            let py = startY;
            
            // Orb data for combination
            const orbData = {
                element: orb,
                x: px,
                y: py,
                vx: vx,
                vy: vy,
                size: orbSize,
                mass: orbMass,
                px: px,
                py: py,
                isMerged: false,
                momentumBoostX: 0,
                momentumBoostY: 0
            };
            activeOrbs.push(orbData);
            
            // Subtle jiggle/wobble parameters
            let jigglePhase = Math.random() * Math.PI * 2;
            let jiggleSpeed = 0.15 + Math.random() * 0.1;
            let wobblePhase = Math.random() * Math.PI * 2;
            let wobbleSpeed = 0.2 + Math.random() * 0.15;
            
            const targetRadius = bigBallSize / 2 + orbSize / 2;
            
            // Gravitational physics constants
            const G = 0.4; // Gravitational constant (stronger pull)
            const maxSpeed = 3.5; // Terminal velocity (increases when closer)
            const airResistance = 0.998; // Very light air resistance
            
            let lastTime = null;
            let hasReachedCenter = false;
            let isMerged = false; // Flag to prevent double-merging
            
            function animate(currentTime) {
                if (lastTime === null) lastTime = currentTime;
                const deltaTime = Math.min((currentTime - lastTime) / 16.67, 2);
                lastTime = currentTime;
                
                if (hasReachedCenter || isMerged) return;
                
                // Apply any pending momentum boosts
                if (orbData.momentumBoostX !== 0 || orbData.momentumBoostY !== 0) {
                    vx += orbData.momentumBoostX;
                    vy += orbData.momentumBoostY;
                    orbData.momentumBoostX = 0;
                    orbData.momentumBoostY = 0;
                }
                
                // Check for collisions with other orbs
                // Only process if this orb hasn't been merged yet
                if (!isMerged) {
                    for (let i = 0; i < activeOrbs.length; i++) {
                        const otherOrb = activeOrbs[i];
                        if (otherOrb === orbData || !otherOrb.element.parentNode || otherOrb.isMerged || isMerged) continue;
                        
                        // Ensure momentum boost properties exist
                        if (otherOrb.momentumBoostX === undefined) {
                            otherOrb.momentumBoostX = 0;
                            otherOrb.momentumBoostY = 0;
                        }
                        
                        const dx = otherOrb.px - px;
                        const dy = otherOrb.py - py;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = (orbSize + otherOrb.size) / 2;
                        
                        if (dist < minDist && dist > 0 && !isMerged && !otherOrb.isMerged) {
                            const sizeDiff = Math.abs(orbSize - otherOrb.size);
                            const sizeThreshold = 0.5; // Threshold for "identical" size
                            
                            // If sizes are identical (within threshold), both disappear
                            if (sizeDiff < sizeThreshold) {
                                // Both disappear
                                isMerged = true;
                                otherOrb.isMerged = true;
                                
                                // Create explosion particles
                                createSpawnParticles(px, py);
                                createSpawnParticles(otherOrb.px, otherOrb.py);
                                
                                // Play explosion sound
                                playSound(200, 0.3, 'sawtooth');
                                
                                // Remove both orbs
                                orb.remove();
                                otherOrb.element.remove();
                                const index1 = activeOrbs.indexOf(orbData);
                                const index2 = activeOrbs.indexOf(otherOrb);
                                if (index1 > -1) activeOrbs.splice(index1, 1);
                                if (index2 > -1 && index2 > index1) activeOrbs.splice(index2 - 1, 1);
                                else if (index2 > -1) activeOrbs.splice(index2, 1);
                                
                                return; // Stop animation
                            }
                            
                            // Determine which orb is bigger
                            const thisIsBigger = orbSize > otherOrb.size;
                            const biggerOrb = thisIsBigger ? orbData : otherOrb;
                            const smallerOrb = thisIsBigger ? otherOrb : orbData;
                            const biggerSize = thisIsBigger ? orbSize : otherOrb.size;
                            const smallerSize = thisIsBigger ? otherOrb.size : orbSize;
                            const biggerMass = thisIsBigger ? orbMass : otherOrb.mass;
                            const smallerMass = thisIsBigger ? otherOrb.mass : orbMass;
                            
                            // If small hits big (size ratio > 1.5), big absorbs and gains momentum
                            const sizeRatio = biggerSize / smallerSize;
                            if (sizeRatio > 1.5 && !isMerged && !otherOrb.isMerged) {
                                // Mark smaller orb as merged
                                smallerOrb.isMerged = true;
                                
                                // Calculate momentum transfer based on size difference
                                const momentumTransfer = 0.3 * (smallerSize / biggerSize); // More momentum if smaller is relatively larger
                                const smallerSpeed = Math.sqrt(smallerOrb.vx * smallerOrb.vx + smallerOrb.vy * smallerOrb.vy);
                                
                                // Add momentum to bigger orb in direction of smaller orb's velocity
                                if (thisIsBigger) {
                                    vx += smallerOrb.vx * momentumTransfer;
                                    vy += smallerOrb.vy * momentumTransfer;
                                    orbData.vx = vx;
                                    orbData.vy = vy;
                                } else {
                                    // We're the smaller one, add momentum boost to bigger orb
                                    biggerOrb.momentumBoostX += smallerOrb.vx * momentumTransfer;
                                    biggerOrb.momentumBoostY += smallerOrb.vy * momentumTransfer;
                                }
                                
                                // Combine masses and sizes
                                const totalMass = biggerMass + smallerMass;
                                const totalSize = Math.sqrt(biggerSize * biggerSize + smallerSize * smallerSize);
                                
                                // Update bigger orb
                                if (thisIsBigger) {
                                    orbMass = totalMass;
                                    orbSize = totalSize;
                                    orb.style.width = orbSize + 'px';
                                    orb.style.height = orbSize + 'px';
                                    orbData.mass = orbMass;
                                    orbData.size = orbSize;
                                } else {
                                    biggerOrb.mass = totalMass;
                                    biggerOrb.size = totalSize;
                                    biggerOrb.element.style.width = totalSize + 'px';
                                    biggerOrb.element.style.height = totalSize + 'px';
                                }
                                
                                // Remove smaller orb
                                smallerOrb.element.remove();
                                const index = activeOrbs.indexOf(smallerOrb);
                                if (index > -1) activeOrbs.splice(index, 1);
                                
                                // Play merge sound
                                playSound(250, 0.2, 'sine');
                                
                                // If we're the smaller one, mark as merged and stop
                                if (!thisIsBigger) {
                                    isMerged = true;
                                    orb.remove();
                                    const index2 = activeOrbs.indexOf(orbData);
                                    if (index2 > -1) activeOrbs.splice(index2, 1);
                                    return;
                                }
                                
                                break;
                            } else if (!isMerged && !otherOrb.isMerged) {
                                // Similar sizes - normal merge
                                otherOrb.isMerged = true;
                                
                                // Combine orbs
                                const totalMass = orbMass + otherOrb.mass;
                                const totalSize = Math.sqrt(orbSize * orbSize + otherOrb.size * otherOrb.size);
                                
                                // Merge velocities (conservation of momentum)
                                vx = (vx * orbMass + otherOrb.vx * otherOrb.mass) / totalMass;
                                vy = (vy * orbMass + otherOrb.vy * otherOrb.mass) / totalMass;
                                
                                // Update orb properties
                                orbMass = totalMass;
                                orbSize = totalSize;
                                orb.style.width = orbSize + 'px';
                                orb.style.height = orbSize + 'px';
                                orbData.mass = orbMass;
                                orbData.size = orbSize;
                                
                                // Remove other orb
                                otherOrb.element.remove();
                                const index = activeOrbs.indexOf(otherOrb);
                                if (index > -1) activeOrbs.splice(index, 1);
                                
                                // Play merge sound
                                playSound(250, 0.2, 'sine');
                                break;
                            }
                            
                            // Break if we got merged
                            if (isMerged) break;
                        }
                    }
                }
                
                // Don't continue if merged
                if (isMerged) return;
                
                const dx = centerX - px;
                const dy = centerY - py;
                const distToCenter = Math.sqrt(dx * dx + dy * dy);
                
                if (distToCenter < targetRadius) {
                    // Orb reached center - smooth squish
                    hasReachedCenter = true;
                    
                    orb.style.transform = 'scale(1.6, 0.25)';
                    orb.style.transition = 'transform 0.2s ease-out';
                    
                    setTimeout(() => {
                        // Grow big ball
                        bigBallSize += 3;
                        bigBall.style.width = bigBallSize + 'px';
                        bigBall.style.height = bigBallSize + 'px';
                        
                        // Big ball squish on absorption
                        bigBallAbsorbing = true;
                        const startTime = Date.now();
                        function absorbAnimation() {
                            const elapsed = (Date.now() - startTime) / 1000;
                            if (elapsed < 0.25) {
                                const progress = elapsed / 0.25;
                                const jiggle = Math.sin(progress * Math.PI * 3) * 0.08 * (1 - progress);
                                const scaleX = 1.12 + jiggle;
                                const scaleY = 0.94 - jiggle;
                                bigBall.style.transform = `translate(-50%, -50%) scale(${scaleX}, ${scaleY})`;
                                requestAnimationFrame(absorbAnimation);
                            } else {
                                bigBall.style.transform = 'translate(-50%, -50%) scale(1, 1)';
                                bigBallAbsorbing = false;
                            }
                        }
                        absorbAnimation();
                        
                        score++;
                        scoreElement.textContent = score;
                        
                        // Play collection sound
                        playSound(400, 0.15, 'sine');
                        
                        // Remove orb from active list
                        const index = activeOrbs.indexOf(orbData);
                        if (index > -1) activeOrbs.splice(index, 1);
                        
                        // Remove orb
                        orb.remove();
                    }, 200);
                    return;
                }
                
                // Calculate direction to center (unit vector)
                const dirX = dx / distToCenter;
                const dirY = dy / distToCenter;
                
                // Gravitational force: F = G * M / r^2
                // Stronger when closer - using inverse square law
                const minDist = 15;
                const effectiveDist = Math.max(distToCenter, minDist);
                
                // Inverse square law - much stronger when closer
                const gravitationalForce = (G * orbMass) / (effectiveDist * effectiveDist);
                
                // Dynamic terminal velocity - faster when closer
                const dynamicMaxSpeed = maxSpeed * (1 + (500 / Math.max(distToCenter, 50)));
                
                // Apply gravitational acceleration
                // F = ma, so a = F/m
                const ax = dirX * gravitationalForce;
                const ay = dirY * gravitationalForce;
                
                // Update velocity with gravitational acceleration
                vx += ax;
                vy += ay;
                
                // Apply light air resistance
                vx *= airResistance;
                vy *= airResistance;
                
                // Cap velocity at dynamic terminal velocity
                const currentSpeed = Math.sqrt(vx * vx + vy * vy);
                if (currentSpeed > dynamicMaxSpeed) {
                    const scale = dynamicMaxSpeed / currentSpeed;
                    vx *= scale;
                    vy *= scale;
                }
                
                // Update position using velocity
                px += vx;
                py += vy;
                
                // Update orb data
                orbData.px = px;
                orbData.py = py;
                orbData.vx = vx;
                orbData.vy = vy;
                
                // Subtle liquid jiggle - gentle oscillation
                jigglePhase += jiggleSpeed;
                wobblePhase += wobbleSpeed;
                
                const speedFactor = Math.min(currentSpeed / maxSpeed, 1);
                const jiggleAmount = 0.8 * speedFactor;
                const jiggleX = Math.sin(jigglePhase) * jiggleAmount;
                const jiggleY = Math.cos(jigglePhase * 1.2) * jiggleAmount;
                
                // Apply subtle jiggle
                const finalX = px + jiggleX;
                const finalY = py + jiggleY;
                
                orb.style.left = finalX - orbSize / 2 + 'px';
                orb.style.top = finalY - orbSize / 2 + 'px';
                
                // Gentle liquid deformation
                const speed = Math.sqrt(vx * vx + vy * vy);
                const stretchX = 1 + Math.abs(vx) * 0.4;
                const stretchY = 1 + Math.abs(vy) * 0.4;
                const wobble = Math.sin(wobblePhase) * 0.08 * speedFactor;
                
                // Smooth liquid shape
                const scaleX = Math.max(0.85, Math.min(1.25, stretchX + wobble));
                const scaleY = Math.max(0.85, Math.min(1.25, stretchY - wobble));
                
                // Gentle rotation
                const baseRotation = Math.atan2(vy, vx) * (180 / Math.PI);
                const rotationWobble = Math.sin(wobblePhase * 1.5) * 4;
                
                orb.style.transform = `scale(${scaleX}, ${scaleY}) rotate(${baseRotation + rotationWobble}deg)`;
                
                requestAnimationFrame(animate);
            }
            
            requestAnimationFrame(animate);
        }

        // Drag handler for momentum
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragLastX = 0;
        let dragLastY = 0;
        let dragStartTime = 0;
        
        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragLastX = e.clientX;
            dragLastY = e.clientY;
            dragStartTime = Date.now();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                dragLastX = e.clientX;
                dragLastY = e.clientY;
            }
        });
        
        let lastSpawnTime = 0;
        
        document.addEventListener('mouseup', (e) => {
            if (isDragging) {
                const dragTime = (Date.now() - dragStartTime) / 1000;
                const dragDistance = Math.sqrt(
                    Math.pow(dragLastX - dragStartX, 2) + 
                    Math.pow(dragLastY - dragStartY, 2)
                );
                
                // Calculate velocity from drag
                const velocityScale = 0.15;
                const vx = (dragLastX - dragStartX) * velocityScale / Math.max(dragTime, 0.1);
                const vy = (dragLastY - dragStartY) * velocityScale / Math.max(dragTime, 0.1);
                
                spawnOrb(dragStartX, dragStartY, vx, vy);
                lastSpawnTime = Date.now();
                isDragging = false;
            }
        });
        
        // Also support click without drag
        document.addEventListener('click', (e) => {
            // Only spawn if it wasn't a drag (quick click)
            const timeSinceDrag = Date.now() - dragStartTime;
            const timeSinceLastSpawn = Date.now() - lastSpawnTime;
            if (timeSinceDrag < 100 && timeSinceLastSpawn > 50) {
                spawnOrb(e.clientX, e.clientY, 0, 0);
                lastSpawnTime = Date.now();
            }
        });
        
        // Animate big ball being pulled by combined orbs
        function animateBigBallPhysics() {
            // Calculate total gravitational pull from all orbs
            let totalPullX = 0;
            let totalPullY = 0;
            const bigBallG = 0.0005; // Stronger pull on big ball
            
            for (const orb of activeOrbs) {
                if (!orb.element.parentNode) continue;
                
                // Only large combined orbs can pull the big ball
                if (orb.mass >= 2) {
                    const dx = orb.px - bigBallPx;
                    const dy = orb.py - bigBallPy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0 && dist < 500) {
                        const dirX = dx / dist;
                        const dirY = dy / dist;
                        const force = (bigBallG * orb.mass) / (dist * dist);
                        totalPullX += dirX * force;
                        totalPullY += dirY * force;
                    }
                }
            }
            
            // Apply pull to big ball
            bigBallVx += totalPullX;
            bigBallVy += totalPullY;
            
            // Less damping for more movement
            bigBallVx *= 0.97;
            bigBallVy *= 0.97;
            
            // Update big ball position
            bigBallPx += bigBallVx;
            bigBallPy += bigBallVy;
            
            // Keep big ball somewhat centered (weaker spring back)
            const centerPull = 0.01;
            bigBallVx += (centerX - bigBallPx) * centerPull;
            bigBallVy += (centerY - bigBallPy) * centerPull;
            
            // Update center for gravity calculations
            centerX = bigBallPx;
            centerY = bigBallPy;
            
            // Update big ball visual position (combine with jiggle transform)
            if (!bigBallAbsorbing) {
                bigBallJiggleTime += 0.016;
                const jiggleX = Math.sin(bigBallJiggleTime * 0.5) * 0.008;
                const jiggleY = Math.cos(bigBallJiggleTime * 0.7) * 0.008;
                const scaleX = 1 + jiggleX;
                const scaleY = 1 + jiggleY;
                const offsetX = bigBallPx - window.innerWidth / 2;
                const offsetY = bigBallPy - window.innerHeight / 2;
                bigBall.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${scaleX}, ${scaleY})`;
            }
            
            requestAnimationFrame(animateBigBallPhysics);
        }
        animateBigBallPhysics();

        // Handle window resize
        window.addEventListener('resize', () => {
            // Recalculate center
            const newCenterX = window.innerWidth / 2;
            const newCenterY = window.innerHeight / 2;
            bigBallPx += newCenterX - centerX;
            bigBallPy += newCenterY - centerY;
            centerX = newCenterX;
            centerY = newCenterY;
        });
    </script>
</body>
</html>
